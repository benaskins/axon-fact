name: axon-fact
purpose: Event sourcing primitives — Event, EventStore, Projector, Publisher
use_when: Audit trail, replay, training corpus
deterministic: true
snippet:
  imports:
    - path: context
    - path: fmt
    - path: log/slog
    - path: os
    - path: github.com/benaskins/axon-base/migration
    - path: github.com/benaskins/axon-base/pool
    - path: github.com/benaskins/axon-fact
      alias: fact
  requires:
    - github.com/benaskins/axon-base
    - github.com/benaskins/axon-fact
  setup: |
    dsn := os.Getenv("DATABASE_URL")
    if dsn == "" {
      fmt.Fprintln(os.Stderr, "DATABASE_URL must be set")
      os.Exit(1)
    }
    p, err := pool.NewPool(context.Background(), dsn, "app")
    if err != nil {
      slog.Error("open database", "error", err)
      os.Exit(1)
    }
    defer p.Close()
    db, err := p.StdDB()
    if err != nil {
      slog.Error("get sql.DB", "error", err)
      os.Exit(1)
    }
    if err := migration.Run(db, fact.Migrations, "migrations"); err != nil {
      slog.Error("run migrations", "error", err)
      os.Exit(1)
    }
    events := fact.NewPostgresStore(db,
      // TODO: register domain projectors here
    )
    if err := events.Replay(context.Background()); err != nil {
      slog.Error("replay events", "error", err)
      os.Exit(1)
    }
